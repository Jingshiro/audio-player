version: '3.8'

services:
  frontend:
    image: ghcr.io/jingshiro/audio-player-frontend:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ghcr.io/jingshiro/audio-player-backend:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=file:./data/music.db
      - UPLOAD_DIR=/app/data/audio
      - NODE_ENV=production
      # CORS 配置 - 必须填写！允许访问的域名（逗号分隔）
      # 例如: https://your-domain.com,https://localhost,capacitor://localhost
      - CORS_ORIGIN=${CORS_ORIGIN}
    restart: unless-stopped

volumes:
  db-data:
