# 生产环境部署 - 使用 GHCR 预构建镜像
# 使用方法: docker compose -f docker-compose.prod.yml up -d

version: '3.8'

services:
  frontend:
    image: ghcr.io/jingshiro/audio-player-frontend:latest
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ghcr.io/jingshiro/audio-player-backend:latest
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ./data/audio:/app/uploads/audio
      - ./data/lyrics:/app/uploads/lyrics
      - db-data:/app/data
    environment:
      - DATABASE_URL=file:./data/music.db
      - NODE_ENV=production
      # CORS 配置 - 必须填写！允许访问的域名（逗号分隔）
      # 例如: https://your-domain.com,https://localhost,capacitor://localhost
      - CORS_ORIGIN=${CORS_ORIGIN}
    restart: unless-stopped

volumes:
  db-data:
